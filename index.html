<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAN JI WOO x CHO YOON</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #f0f2f5; }

        /* [1] 인트로 영상 레이어 */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; background: #000; cursor: pointer;
        }
        .intro-video { width: 100%; height: 100%; object-fit: contain; } /* 영상 비율 유지 */

        /* [2] 쫌좀님이 찾으시던 그 메인 화면 (1.JPG 스타일) */
        #main-content {
            display: none; width: 100%; height: 100%;
            background: url('1.JPG') no-repeat center center; /* 1.JPG를 배경으로 */
            background-size: cover;
            flex-direction: column; justify-content: center; align-items: center;
        }

        /* 1.JPG 화면에 있던 ENTER 버튼 스타일 */
        .enter-btn {
            margin-top: 350px; /* 1.JPG 이미지 버튼 위치에 맞게 조절 */
            padding: 10px 40px;
            border: 2px solid #a5b8d0;
            border-radius: 30px;
            background: rgba(255,255,255,0.8);
            color: #a5b8d0;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .enter-btn:hover { background: #a5b8d0; color: white; }
    </style>
</head>
<body>

    <div id="intro-layer" onclick="showMain()">
        <video id="myVideo" autoplay playsinline class="intro-video">
            <source src="promo.mp4" type="video/mp4">
        </video>
    </div>

    <div id="main-content">
        <a href="jiwoo-list.html" class="enter-btn">ENTER</a>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const intro = document.getElementById('intro-layer');
        const main = document.getElementById('main-content');

        // 메인 화면으로 전환하는 함수
        function showMain() {
            intro.style.display = 'none';
            main.style.display = 'flex';
            video.pause(); // 영상 멈춤
        }

        // 영상이 끝나면 자동으로 메인 이동
        video.onended = function() {
            showMain();
        };

        // 브라우저 정책상 첫 소리는 클릭이 필요할 수 있어 안내
        window.onclick = function() {
            video.muted = false; // 화면 어디든 클릭하면 소리 켜짐
        }
    </script>

</body>
</html>
