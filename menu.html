<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELECT ACTOR</title>
    <style>
        /* [쫌좀님 전용] 세련된 뉴모피즘 스타일 */
        body { 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            text-align: center; 
            background: #eef2f6; 
            margin: 0; padding: 0; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            overflow: hidden;
        }

        .bgm-player { 
            position: fixed; top: 30px; left: 30px; z-index: 10001; 
            display: flex; align-items: center; gap: 15px; padding: 10px 20px; 
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); 
            border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); 
        }

        .actor-container { display: flex; gap: 50px; justify-content: center; width: 100%; }
        
        .actor-card { 
            text-decoration: none; width: 220px; height: 120px; 
            background: linear-gradient(135deg, #fff 0%, #f0f4f8 100%); 
            border-radius: 30px; display: flex; align-items: center; justify-content: center; 
            box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff; 
            border: 1px solid rgba(255,255,255,0.8); transition: 0.5s;
        }

        .actor-name { font-size: 1.1rem; font-weight: 800; color: #555; letter-spacing: 2px; }

        .actor-card:hover { transform: translateY(-15px); background: #8ea8c9; }
        .actor-card:hover .actor-name { color: white; }
    </style>
</head>
<body>
    <div class="actor-container">
        <a href="jiwoo-list.html" class="actor-card">
            <span class="actor-name">Han Ji Woo</span>
        </a>
        <a href="joyoon-list.html" class="actor-card">
            <span class="actor-name">Cho Yoon</span>
        </a>
    </div>
</body>
</html>
