<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETERNAL SUNSHINE</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #eef2f6; 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            font-family: 'Apple SD Gothic Neo', sans-serif; overflow: hidden;
        }

        /* 메인 타이틀 (ETERNAL SUNSHINE) */
        .main-title {
            font-size: 2.5rem; font-weight: 200; color: #8ea8c9;
            letter-spacing: 15px; margin-bottom: 60px;
            text-transform: uppercase;
        }

        /* 4.gif 스타일이 적용된 ENTER 버튼 */
        .enter-btn { 
            text-decoration: none; 
            width: 220px; height: 80px; 
            background: #eef2f6; border-radius: 40px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; color: #8ea8c9; letter-spacing: 5px;
            /* 기본 상태: 입체적으로 튀어나온 그림자 */
            box-shadow: 15px 15px 30px #d1d9e6, -15px -15px 30px #ffffff; 
            transition: all 0.3s ease; 
        }

        /* 마우스를 올렸을 때: 4.gif처럼 쫀득하게 안으로 들어가는 효과 */
        .enter-btn:hover { 
            /* 핵심: inset 그림자로 변경 */
            box-shadow: inset 8px 8px 16px #d1d9e6, inset -8px -8px 16px #ffffff; 
            transform: scale(0.98); /* 살짝 눌리는 느낌 추가 */
        }
    </style>
</head>
<body>
    <h1 class="main-title">ETERNAL SUNSHINE</h1>
    <a href="menu.html" class="enter-btn">ENTER</a>
</body>
</html>
