<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>INTRO</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; }
        .video-wrapper { width: 88%; max-width: 900px; aspect-ratio: 16 / 9; }
        video { width: 100%; height: auto; cursor: pointer; }
    </style>
</head>
<body>
    <div class="video-wrapper">
        <video id="v" autoplay muted playsinline>
            <source src="promo.mp4" type="video/mp4">
        </video>
    </div>
    <script>
        const v = document.getElementById('v');
        v.onended = () => { window.location.href = 'main_gate.html'; };
        v.onclick = () => { window.location.href = 'main_gate.html'; };
    </script>
</body>
</html>
