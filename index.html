<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAN JI WOO x CHO YOON</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #ebf1f6; 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
        }

        /* [1] 인트로 영상 레이어 (영화관 느낌) */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; background: #000; display: none; 
            justify-content: center; align-items: center;
        }

        /* 영상 프레임: 화면의 80~90%만 차지하게 하여 영화관 비율 생성 */
        .video-wrapper {
            width: 85%; /* 화면 너비의 85%만 사용 (여백 생성) */
            max-width: 900px; /* PC에서도 너무 커지지 않게 제한 */
            aspect-ratio: 16 / 9; /* 시네마틱 비율 유지 */
            display: flex; justify-content: center; align-items: center;
            background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); /* 입체감 */
        }

        .intro-video { 
            width: 100%; height: auto; 
            cursor: pointer; 
            border-radius: 4px; /* 미세한 라운드 처리로 고급스럽게 */
        }

        /* [2] 메인 대문 디자인 (반응형 유지) */
        #main-content {
            display: none; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        .bgm-controls { position: absolute; top: 30px; left: 25px; }
        .bgm-btn {
            background: rgba(255, 255, 255, 0.85); border: 1px solid #ddd;
            border-radius: 20px; padding: 6px 14px; font-size: 0.7rem; color: #a5b8d0;
        }

        .img-container {
            width: 85vw; max-width: 480px; aspect-ratio: 16 / 9;
            background: url('main.jpg') no-repeat center center;
            background-size: cover; border: 6px solid white;
            border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            margin-bottom: 5vh;
        }

        .sub-title { font-size: clamp(0.65rem, 2vw, 0.8rem); color: #a5b8d0; letter-spacing: 0.4em; margin-bottom: 6vh; text-transform: uppercase; }
        .enter-btn {
            padding: 12px 60px; border: 1.5px solid #a5b8d0; border-radius: 35px;
            background: white; color: #a5b8d0; text-decoration: none;
            font-size: 0.75rem; font-weight: bold; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div id="intro-layer">
        <div class="video-wrapper">
            <video id="myVideo" autoplay muted playsinline class="intro-video" onclick="handleVideoClick()">
                <source src="promo.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <div id="main-content">
        <div class="bgm-controls"><div class="bgm-btn">||| &nbsp; 01 &nbsp; →</div></div>
        <div class="img-container"></div>
        <div class="sub-title">ETERNAL SUNSHINE</div>
        <a href="menu.html" class="enter-btn">ENTER</a>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const bgm = document.getElementById('bgm');
        const intro = document.getElementById('intro-layer');
        const main = document.getElementById('main-content');

        const hasSeenIntro = sessionStorage.getItem('visited');
        if (!hasSeenIntro) {
            intro.style.display = 'flex';
            sessionStorage.setItem('visited', 'true');
        } else {
            intro.remove(); 
            main.style.display = 'flex';
        }

        function handleVideoClick() {
            if (video.muted) { video.muted = false; } 
            else { showMain(); }
        }

        function showMain() {
            video.pause();
            video.src = ""; 
            intro.style.display = 'none';
            main.style.display = 'flex';
            bgm.play().catch(e => {});
        }
        video.onended = function() { showMain(); };
    </script>
</body>
</html>
