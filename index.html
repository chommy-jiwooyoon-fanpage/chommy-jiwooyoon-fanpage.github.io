<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAN JI WOO x CHO YOON</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Apple SD Gothic Neo', sans-serif; }

        /* [1] 인트로 영상 (딱 한 번 재생) */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; background: #000; display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .intro-video { max-width: 100%; max-height: 100%; }

        /* [2] 쪼좀님이 찾으시던 그 메인 사진 (main.jpg) */
        #main-content {
            display: none; width: 100%; height: 100%;
            background: url('main.jpg') no-repeat center center; /* 이름을 main으로 정확히 수정 */
            background-size: cover;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .enter-btn {
            margin-top: 320px;
            padding: 12px 45px;
            border: 2px solid #a5b8d0;
            border-radius: 35px;
            background: rgba(255,255,255,0.9);
            color: #a5b8d0;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 3px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="intro-layer" onclick="showMain()">
        <video id="myVideo" autoplay muted playsinline class="intro-video">
            <source src="promo.mp4" type="video/mp4">
        </video>
    </div>

    <div id="main-content">
        <a href="jiwoo-list.html" class="enter-btn">ENTER</a>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const intro = document.getElementById('intro-layer');
        const main = document.getElementById('main-content');

        function showMain() {
            intro.style.display = 'none';
            main.style.display = 'flex';
            video.pause();
        }

        video.onended = function() { showMain(); };
    </script>
</body>
</html>
