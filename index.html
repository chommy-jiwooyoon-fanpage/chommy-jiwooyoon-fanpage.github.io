<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAN JI WOO x CHO YOON</title>
    <style>
        body { 
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; 
            background: #eef2f6; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            color: #333; 
            overflow: hidden;
        }
        
        /* [초세련] 미니멀 BGM 컨트롤러 */
        .bgm-player {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 10001;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03);
        }

        /* 리듬 시각화 애니메이션 (재생 중일 때만 작동) */
        .visualizer {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 12px;
            cursor: pointer;
        }
        .bar {
            width: 2px;
            height: 100%;
            background: #8ea8c9;
            border-radius: 2px;
            transition: 0.3s;
        }
        .playing .bar { animation: wave 1s ease-in-out infinite; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 4px; }
            50% { height: 12px; }
        }

        /* 재생/다음 아이콘 버튼 */
        .control-group { display: flex; align-items: center; gap: 12px; border-left: 1px solid rgba(142, 168, 201, 0.3); padding-left: 12px; }
        .btn-icon {
            cursor: pointer;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8ea8c9;
            transition: 0.3s;
            font-size: 14px;
            user-select: none;
        }
        .btn-icon:hover { color: #7baaff; transform: scale(1.2); }
        .track-num { font-size: 10px; color: #8ea8c9; font-weight: 800; letter-spacing: 1px; opacity: 0.7; }

        /* 메인 콘텐츠 디자인 */
        .main-container { width: 90%; max-width: 650px; text-align: center; }
        .banner-img { width: 100%; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); display: block; margin-bottom: 40px; border: 8px solid white; box-sizing: border-box; }
        .enter-btn { display: inline-block; padding: 12px 45px; font-size: 0.9rem; font-weight: 700; letter-spacing: 2px; color: #8ea8c9; border: 2px solid #8ea8c9; border-radius: 50px; text-decoration: none; transition: 0.3s; cursor: pointer; background: white; }
        .enter-btn:hover { background: #8ea8c9; color: #fff; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(142, 168, 201, 0.2); }
        .site-title { font-size: 1.1rem; font-weight: 300; letter-spacing: 6px; margin-top: 10px; color: #adbcd1; text-transform: uppercase; }

        /* SNS 버튼 */
        .sns-fixed-container { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; }
        .sns-link { text-decoration: none; color: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; border-radius: 50%; }
        .x-icon { background: #000; }
        .ig-icon { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    </style>
</head>
<body>

    <div class="bgm-player">
        <div class="visualizer" id="visualizer" onclick="toggleMusic()">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        
        <div class="control-group">
            <div class="track-num" id="track-info">01</div>
            <div class="btn-icon" onclick="nextMusic()">→</div>
        </div>

        <audio id="main-bgm" onended="nextMusic()">
            <source id="audio-source" src="bgm1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="main-container">
        <img src="main.jpg" class="banner-img" alt="Main Banner">
        <div class="site-title">Eternal Sunshine</div>
        <div style="margin-top: 40px;">
            <a onclick="location.href='menu.html'" class="enter-btn">ENTER</a>
        </div>
    </div>

    <div class="sns-fixed-container">
        <a href="https://twitter.com/zzomzom_" target="_blank" class="sns-link x-icon">X</a>
        <a href="https://instagram.com/chommy_9" target="_blank" class="sns-link ig-icon">IG</a>
    </div>

    <script>
        const playlist = ["bgm1.mp3", "bgm2.mp3", "bgm3.mp3"]; 
        let currentTrack = 0;
        const music = document.getElementById('main-bgm');
        const source = document.getElementById('audio-source');
        const trackInfo = document.getElementById('track-info');
        const visualizer = document.getElementById('visualizer');

        function toggleMusic() {
            if (music.paused) {
                music.play();
                visualizer.classList.add('playing');
            } else {
                music.pause();
                visualizer.classList.remove('playing');
            }
        }

        function nextMusic() {
            currentTrack = (currentTrack + 1) % playlist.length;
            source.src = playlist[currentTrack];
            music.load();
            music.play();
            trackInfo.innerText = (currentTrack + 1).toString().padStart(2, '0');
            visualizer.classList.add('playing');
        }
    </script>

</body>
</html>
