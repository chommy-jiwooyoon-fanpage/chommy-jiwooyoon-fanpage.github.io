<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>익명게시판</title>
    <link href="https://fonts.googleapis.com/css2?family=Song+Myung&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #eef2f6; display: flex; flex-direction: column; align-items: center; font-family: 'Song Myung', serif; }
        .side-nav { position: fixed; left: 30px; top: 30px; }
        .nav-btn { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .main-title { margin-top: 100px; margin-bottom: 25px; font-size: 1.8rem; color: #8ea8c9; letter-spacing: 8px; font-weight: 400; text-align: center; }
        .board-container { width: 90%; max-width: 580px; background: white; border-radius: 28px; padding: 40px; box-shadow: 0 20px 40px rgba(142, 168, 201, 0.08); }
        textarea { width: 100%; height: 120px; border: none; border-radius: 18px; padding: 20px; box-sizing: border-box; background: #f8fafc; font-family: inherit; font-size: 1rem; resize: none; }
        .btn-group { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
        .btn { padding: 10px 28px; border: none; border-radius: 25px; cursor: pointer; font-size: 0.85rem; font-weight: 600; font-family: inherit; }
        .btn-reg { background: #8ea8c9; color: white; } 
        .btn-del { background: #f1f3f5; color: #999; }
        .back-link { position: fixed; bottom: 40px; text-decoration: none; color: #b0c4de; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; }
    </style>
</head>
<body>
    <div class="side-nav"><a href="index.html" class="nav-btn">🏠</a></div>
    <h1 class="main-title">익 명 게 시 판</h1>
    <div class="board-container">
        <textarea placeholder="메시지를 입력해주세요."></textarea>
        <div class="btn-group">
            <button class="btn btn-del">삭제</button>
            <button class="btn btn-reg">등록</button>
        </div>
    </div>
    <a href="menu.html" class="back-link">← BACK TO MENU</a>
</body>
</html>
