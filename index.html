<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한지우 x 조윤 팬페이지</title>
    <style>
        body { 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #fff5f5 0%, #f0f4ff 100%); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* 쫌좀님의 명령: 사진을 더 작고 세련되게 (액자형 스타일) */
        .entrance-banner {
            width: 90%;      /* 화면 가득 채우지 않고 옆에 여유를 줌 */
            max-width: 600px; /* 최대 가로 길이를 제한하여 너무 커지지 않게 함 */
            margin: 30px auto 10px; /* 위아래 여백을 주어 답답함 해소 */
            border-radius: 15px; /* 모서리를 둥글게 해서 부드러운 느낌 추가 */
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* 살짝 그림자를 주어 입체감 부여 */
        }
        
        .entrance-banner img {
            width: 100%;
            height: auto;     /* 비율 유지 (잘림 방지) */
            display: block;
            cursor: pointer;
        }

        .content { padding: 20px; }
        .actor-name { font-size: 2.5rem; font-weight: 800; color: #222; margin: 10px 0; }
        .heart { color: #ff6b6b; }
        .sns-container { margin-top: 20px; }
        .btn { 
            display: inline-block; padding: 12px 24px; margin: 8px; 
            border-radius: 30px; text-decoration: none; font-weight: 600; color: white; 
        }
        .twitter { background-color: #1DA1F2; }
        .instagram { background-color: #E1306C; }
    </style>
</head>
<body>

    <div class="entrance-banner">
        <img src="main.jpg" alt="메인 사진">
    </div>

    <div class="content">
        <div class="actor-name">한지우 <span class="heart">♥</span> 조윤</div>
        <p>배우 한지우와 조윤을 응원하는 <strong>쫌좀</strong>의 기록 공간입니다.</p>
        
        <div class="sns-container">
            <a href="https://twitter.com/zzomzom_" target="_blank" class="btn twitter">Twitter @zzomzom_</a>
            <a href="https://instagram.com/chommy_9" target="_blank" class="btn instagram">Instagram @chommy_9</a>
        </div>
    </div>

</body>
</html>
