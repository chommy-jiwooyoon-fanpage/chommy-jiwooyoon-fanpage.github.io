<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUESTBOOK - 익명 한줄평</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; background: #f0f4ff; margin: 0; padding: 40px 20px; }
        .back-home { position: fixed; top: 20px; left: 20px; width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 9999; text-decoration: none; }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">🏠</a>

    <h2>💬 익명 한줄평 게시판</h2>
    
    <div id="board-container" style="max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);"></div>

    <script>
        fetch('board.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('board-container').innerHTML = data;
            });
    </script>
</body>
</html>
