<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QUEST BOOK</title>
    <style>
        body { margin: 0; background-color: #ebf1f6; font-family: 'Apple SD Gothic Neo', sans-serif; padding-bottom: 50px; }
        .nav-bar { display: flex; padding: 20px; max-width: 600px; margin: 0 auto; }
        .home-icon { font-size: 1.5rem; text-decoration: none; cursor: pointer; color: inherit; }
        .board-container { width: 92%; max-width: 600px; margin: 10px auto; padding: 25px; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); box-sizing: border-box; }
        .board-title { color: #a5b8d0; text-align: center; letter-spacing: 5px; font-size: 1.1rem; margin-bottom: 25px; font-weight: 300; text-transform: uppercase; }

        /* 입력창 스타일 - VS Code 경고 해결 완료 */
        .input-box { 
            width: 100%; padding: 18px; border: 1px solid #f0f4f8; border-radius: 20px; font-size: 0.95rem; 
            outline: none; background: #f9fbfc; box-sizing: border-box; color: #666; margin-bottom: 10px; resize: none; 
            -webkit-appearance: none; 
            appearance: none; /* ✅ 표준 속성 추가로 숫자 2 사라짐 */
        }

        .pw-input { 
            width: 100%; padding: 15px 18px; border: 1px solid #f0f4f8; border-radius: 15px; font-size: 0.9rem; 
            outline: none; background: #f9fbfc; box-sizing: border-box; color: #666; margin-bottom: 15px; 
            -webkit-appearance: none;
            appearance: none; /* ✅ 표준 속성 추가 */
        }

        .submit-btn { width: 100%; background: #a5b8d0; color: white; border: none; padding: 18px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.9rem; letter-spacing: 2px; transition: 0.3s; }
        .submit-btn:active { transform: scale(0.98); background: #8ea8c9; }

        #post-list { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .post-card { background: #fff; padding: 20px; border-radius: 20px; border: 1px solid #f4f7f9; box-shadow: 0 4px 15px rgba(0,0,0,0.01); }
        .post-content { font-size: 0.9rem; color: #555; line-height: 1.7; margin: 0; white-space: pre-wrap; word-break: break-all; }
        .post-info { font-size: 0.75rem; color: #cbd5e0; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #fff5f5; color: #ff9b9b; border: none; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; }

        @media (max-width: 480px) {
            .board-container { padding: 20px; width: 94%; }
            .board-title { font-size: 1rem; letter-spacing: 3px; }
            .nav-bar { padding: 15px; }
        }
    </style>
</head>
<body>
    <script src="nav.js"></script>
    <div class="nav-bar">
        <a href="index.html" class="home-icon">🏠</a>
    </div>
    
    <div class="board-container">
        <h2 class="board-title">QUEST BOOK</h2>
        <textarea id="postInput" class="input-box" rows="3" placeholder="지우님께 따뜻한 한마디를 남겨주세요!"></textarea>
        <input type="password" id="pwInput" class="pw-input" placeholder="비밀번호 (삭제할 때만 필요, 안 써도 됨)">
        <button id="saveBtn" class="submit-btn">작성 완료</button>
        <div id="post-list"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDXz0NasgyMsWtlXriyqocMF1Tqe2FJXkg",
        authDomain: "jiwoo-fan.firebaseapp.com",
        projectId: "jiwoo-fan",
        storageBucket: "jiwoo-fan.firebasestorage.app",
        messagingSenderId: "70224934316",
        appId: "1:70224934316:web:2ad83d9e1c55f20e7bf609"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const postsCol = collection(db, "posts");

    document.getElementById('saveBtn').onclick = async () => {
        const content = document.getElementById('postInput').value;
        const pw = document.getElementById('pwInput').value;
        
        // ✅ [수정] 내용만 있으면 작성되도록 변경 (비밀번호 필수 체크 제거)
        if (!content.trim()) { 
            alert("내용을 입력해주세요."); 
            return; 
        }
        
        try {
            await addDoc(postsCol, { 
                text: content, 
                password: pw || "0000", // 비밀번호 미입력 시 '0000' 기본값
                createdAt: serverTimestamp() 
            });
            document.getElementById('postInput').value = "";
            document.getElementById('pwInput').value = "";
        } catch (e) {
            alert("저장에 실패했습니다.");
        }
    };

    onSnapshot(query(postsCol, orderBy("createdAt", "desc")), (snapshot) => {
        const list = document.getElementById('post-list');
        list.innerHTML = "";
        snapshot.forEach((p) => {
            const data = p.data();
            const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : "방금 전";
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <p class="post-content">${data.text}</p>
                <div class="post-info">
                    <span>${date}</span>
                    <button class="del-btn" onclick="deleteWithPw('${p.id}', '${data.password}')">삭제</button>
                </div>`;
            list.appendChild(card);
        });
    });

    window.deleteWithPw = async (id, correctPw) => {
        const inputPw = prompt("비밀번호를 입력하세요.");
        if (inputPw === correctPw) {
            if(confirm("정말 삭제하시겠습니까?")) await deleteDoc(doc(db, "posts", id));
        } else if (inputPw !== null) alert("비밀번호가 틀렸습니다.");
    };
</script>
</body>
</html>
