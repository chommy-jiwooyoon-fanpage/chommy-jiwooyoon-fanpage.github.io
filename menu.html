<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SELECT ACTOR</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; background: #eef2f6; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .actor-container { display: flex; gap: 50px; }
        .actor-card { text-decoration: none; width: 240px; height: 140px; background: linear-gradient(135deg, #fff 0%, #f0f4f8 100%); border-radius: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff; border: 1px solid rgba(255,255,255,0.8); transition: 0.5s; }
        .actor-name { font-size: 1.2rem; font-weight: 800; color: #555; letter-spacing: 2px; text-transform: uppercase; }
        .actor-card:hover { transform: translateY(-20px); background: #8ea8c9; box-shadow: 0 25px 50px rgba(142, 168, 201, 0.3); }
        .actor-card:hover .actor-name { color: white; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="actor-container">
        <a href="jiwoo-list.html" class="actor-card"><span class="actor-name">Han Ji Woo</span></a>
        <a href="joyoon-list.html" class="actor-card"><span class="actor-name">Cho Yoon</span></a>
    </div>
</body>
</html>
