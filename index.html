<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>ETERNAL SUNSHINE</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #eef2f6; 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            font-family: 'Apple SD Gothic Neo', sans-serif; overflow-x: hidden;
        }

        /* 상단 대표 사진 (main.jpg) */
        .main-image {
            max-width: 80%; 
            height: auto;
            margin-top: 40px;
            margin-bottom: 30px; 
            border-radius: 30px; 
            box-shadow: 0 0 100px 20px rgba(0, 0, 0, 0.05); 
        }

        /* 메인 타이틀 */
        .main-title {
            font-size: 2.2rem; font-weight: 200; color: #8ea8c9;
            letter-spacing: 12px; margin-bottom: 30px;
            text-transform: uppercase;
            text-align: center;
        }

        /* 2단계: BGM 섹션 스타일 */
        .bgm-player {
            text-align: center;
            margin-bottom: 40px;
        }
        .bgm-player p {
            font-size: 13px; color: #a5b8d0; 
            letter-spacing: 2px; margin-bottom: 15px;
        }

        /* ENTER 버튼 */
        .enter-btn { 
            text-decoration: none; 
            width: 220px; height: 80px; 
            background: #eef2f6; border-radius: 40px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; color: #8ea8c9; letter-spacing: 5px;
            box-shadow: 15px 15px 30px #d1d9e6, -15px -15px 30px #ffffff; 
            transition: all 0.3s ease; 
            margin-bottom: 40px;
        }

        .enter-btn:hover { 
            box-shadow: inset 8px 8px 16px #d1d9e6, inset -8px -8px 16px #ffffff; 
            transform: scale(0.98); 
        }

        /* 3단계: 모바일 최적화 (768px 이하) */
        @media (max-width: 768px) {
            body { justify-content: flex-start; } /* 모바일에서 위아래 잘림 방지 */
            
            .main-image { max-width: 90%; margin-top: 30px; }
            
            .main-title { 
                font-size: 1.4rem; 
                letter-spacing: 6px; 
                margin-bottom: 25px; 
            }

            .bgm-player iframe {
                width: 240px; /* 모바일 화면에 맞춰 축소 */
                height: 135px;
            }

            .enter-btn {
                width: 180px;
                height: 65px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <img src="main.jpg" alt="대표 사진" class="main-image">

    <h1 class="main-title">ETERNAL SUNSHINE</h1>

    <div class="bgm-player">
        <p>NOW PLAYING 🎵</p>
        <iframe width="280" height="157" 
            src="https://www.youtube.com/embed/RuRT3B4u5bk" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            style="border-radius: 20px; box-shadow: 0 10px 30px rgba(165, 184, 208, 0.1);">
        </iframe>
    </div>
    
    <a href="menu.html" class="enter-btn">ENTER</a>
</body>
</html>
