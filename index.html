<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JIWOO FAN BOARD</title>
    <style>
        body { margin: 0; background-color: #ebf1f6; font-family: 'Apple SD Gothic Neo', sans-serif; }
        
        /* [1] 게시판 전체 컨테이너 (반응형) */
        .board-container {
            width: 90%; max-width: 600px; /* 폰/패드/PC 통합 정렬 */
            margin: 40px auto; padding: 20px;
            background: white; border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .board-title { color: #a5b8d0; text-align: center; letter-spacing: 3px; font-size: 1.2rem; margin-bottom: 25px; }

        /* [2] 글 쓰기 영역 */
        .write-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .input-box {
            padding: 12px; border: 1.5px solid #f0f4f8; border-radius: 15px;
            font-size: 0.9rem; outline: none; background: #f9fbfc;
        }
        .submit-btn {
            background: #a5b8d0; color: white; border: none; padding: 12px;
            border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .submit-btn:active { transform: scale(0.98); }

        /* [3] 모두가 보는 글 목록 영역 */
        #post-list { display: flex; flex-direction: column; gap: 15px; }
        .post-card {
            background: #fdfdfd; padding: 15px; border-radius: 18px;
            border-bottom: 2px solid #ebf1f6; position: relative;
            animation: fadeIn 0.5s ease;
        }
        .post-content { font-size: 0.9rem; color: #555; line-height: 1.5; margin-bottom: 8px; }
        .post-info { font-size: 0.7rem; color: #a5b8d0; display: flex; justify-content: space-between; }
        .delete-btn { color: #ffb3b3; cursor: pointer; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="board-container">
    <h2 class="board-title">GUEST BOOK</h2>

    <div class="write-section">
        <textarea id="postInput" class="input-box" rows="3" placeholder="지우님께 익명으로 메시지를 남겨보세요!"></textarea>
        <button onclick="addPost()" class="submit-btn">등록하기</button>
    </div>

    <div id="post-list">
        <div class="post-card">
            <p class="post-content">오늘 지우님 영상 너무 예뻐요! 쫌좀님 감사합니다.</p>
            <div class="post-info">
                <span>익명팬 · 방금 전</span>
                <span class="delete-btn">삭제</span>
            </div>
        </div>
    </div>
</div>

<script>
    // 쫌좀님! 지금 이 방식은 내 브라우저에만 저장되는 방식이에요.
    // 다른 사람과 글을 공유하려면 'Firebase' 같은 DB를 연결해야 합니다.
    function addPost() {
        const input = document.getElementById('postInput');
        if (!input.value.trim()) return alert("내용을 입력해주세요!");

        const list = document.getElementById('post-list');
        const newPost = document.createElement('div');
        newPost.className = 'post-card';
        newPost.innerHTML = `
            <p class="post-content">${input.value}</p>
            <div class="post-info">
                <span>익명팬 · 방금 전</span>
                <span class="delete-btn" onclick="this.parentElement.parentElement.remove()">삭제</span>
            </div>
        `;
        
        list.prepend(newPost); // 최신글이 위로
        input.value = "";
    }
</script>

</body>
</html>
