<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAN JI WOO x CHO YOON</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #ebf1f6; 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
        }

        /* [1] 인트로 영상 레이어 */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; background: #000; display: flex; 
            justify-content: center; align-items: center;
        }

        .video-wrapper {
            width: 88%; 
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .intro-video { 
            width: 100%; height: auto; 
            cursor: pointer; 
        }

        /* [2] 메인 대문 레이어 */
        #main-content {
            display: none; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .img-container {
            width: 85vw; max-width: 480px; aspect-ratio: 16 / 9;
            background: url('main.jpg') no-repeat center center;
            background-size: cover; border: 6px solid white;
            border-radius: 24px; margin-bottom: 5vh;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }

        .sub-title { 
            font-size: 0.8rem; 
            color: #a5b8d0; 
            letter-spacing: 0.4em; 
            margin-bottom: 6vh; 
            text-transform: uppercase; 
        }
        
        /* [3] 엔터 버튼 (배우 페이지 menu.html로 정확히 연결) */
        .enter-btn {
            padding: 12px 60px; border: 1.5px solid #a5b8d0; border-radius: 35px;
            background: white; color: #a5b8d0; text-decoration: none;
            font-size: 0.75rem; font-weight: bold; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div id="intro-layer">
        <div class="video-wrapper">
            <video id="myVideo" autoplay muted playsinline class="intro-video">
                <source src="promo.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div id="main-content">
        <div class="img-container"></div>
        <div class="sub-title">ETERNAL SUNSHINE</div>
        <a href="menu.html" class="enter-btn">ENTER</a>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const intro = document.getElementById('intro-layer');
        const main = document.getElementById('main-content');

        // 영상이 끝나면 대문 페이지를 보여줍니다.
        video.onended = function() {
            intro.style.display = 'none';
            main.style.display = 'flex';
        };

        // 영상을 클릭(터치)하면 바로 대문으로 넘어갑니다.
        video.onclick = function() {
            intro.style.display = 'none';
            main.style.display = 'flex';
        };
    </script>
</body>
</html>
