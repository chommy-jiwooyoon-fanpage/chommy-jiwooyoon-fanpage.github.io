<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=0">
    <title>QUEST BOOK</title>
    <style>
        body { 
            margin: 0; background-color: #ebf1f6; 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            padding-bottom: 80px; /* 하단 여백 확보 */
            -webkit-tap-highlight-color: transparent; /* 터치 시 파란 박스 방지 */
        }
        .nav-bar { display: flex; padding: 20px; max-width: 600px; margin: 0 auto; }
        .home-icon { font-size: 1.5rem; text-decoration: none; cursor: pointer; color: #a5b8d0; }
        
        .board-container { 
            width: 92%; max-width: 600px; margin: 0 auto; 
            padding: 25px; background: white; border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); box-sizing: border-box; 
        }
        .board-title { 
            color: #a5b8d0; text-align: center; letter-spacing: 5px; 
            font-size: 1.1rem; margin-bottom: 25px; font-weight: 300; 
            text-transform: uppercase; 
        }

        /* 입력창 스타일 */
        .input-box { 
            width: 100%; padding: 18px; border: 1px solid #f0f4f8; border-radius: 20px; 
            font-size: 16px; /* 모바일 자동확대 방지를 위해 16px 권장 */
            outline: none; background: #f9fbfc; box-sizing: border-box; 
            color: #666; margin-bottom: 12px; resize: none; 
            appearance: none; -webkit-appearance: none;
        }

        .pw-input { 
            width: 100%; padding: 15px 18px; border: 1px solid #f0f4f8; border-radius: 15px; 
            font-size: 14px; outline: none; background: #f9fbfc; 
            box-sizing: border-box; color: #666; margin-bottom: 15px; 
            appearance: none; -webkit-appearance: none;
        }

        .submit-btn { 
            width: 100%; background: #a5b8d0; color: white; border: none; 
            padding: 18px; border-radius: 20px; cursor: pointer; 
            font-weight: bold; font-size: 0.95rem; letter-spacing: 2px; 
            transition: 0.3s; box-shadow: 0 5px 15px rgba(165, 184, 208, 0.3);
        }
        .submit-btn:active { transform: scale(0.98); background: #8ea8c9; }

        #post-list { margin-top: 35px; display: flex; flex-direction: column; gap: 15px; }
        .post-card { 
            background: #fff; padding: 22px; border-radius: 22px; 
            border: 1px solid #f4f7f9; box-shadow: 0 4px 15px rgba(0,0,0,0.01); 
        }
        .post-content { 
            font-size: 0.95rem; color: #555; line-height: 1.7; 
            margin: 0; white-space: pre-wrap; word-break: break-all; 
        }
        .post-info { 
            font-size: 0.75rem; color: #cbd5e0; margin-top: 18px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        
        /* 모바일 터치 영역을 고려한 삭제 버튼 */
        .del-btn { 
            background: #fff5f5; color: #ff9b9b; border: none; 
            padding: 8px 14px; border-radius: 10px; cursor: pointer; 
            font-size: 0.75rem; font-weight: bold;
        }

        /* 📱 모바일 반응형 최종 최적화 */
        @media (max-width: 480px) {
            .board-container { padding: 20px; width: 94%; }
            .board-title { font-size: 1rem; letter-spacing: 3px; margin-bottom: 20px; }
            .input-box { padding: 15px; }
            .submit-btn { padding: 16px; font-size: 0.9rem; }
            .post-card { padding: 18px; }
            .nav-bar { padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <script src="nav.js"></script>
    <div class="nav-bar">
        <a href="index.html" class="home-icon">🏠</a>
    </div>
    
    <div class="board-container">
        <h2 class="board-title">QUEST BOOK</h2>
        <textarea id="postInput" class="input-box" rows="3" placeholder="지우님께 따뜻한 한마디를 남겨주세요!"></textarea>
        <input type="password" id="pwInput" class="pw-input" placeholder="비밀번호 (삭제 시 필요)">
        <button id="saveBtn" class="submit-btn">작성 완료</button>
        <div id="post-list"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDXz0NasgyMsWtlXriyqocMF1Tqe2FJXkg",
        authDomain: "jiwoo-fan.firebaseapp.com",
        projectId: "jiwoo-fan",
        storageBucket: "jiwoo-fan.firebasestorage.app",
        messagingSenderId: "70224934316",
        appId: "1:70224934316:web:2ad83d9e1c55f20e7bf609"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const postsCol = collection(db, "posts");

    document.getElementById('saveBtn').onclick = async () => {
        const content = document.getElementById('postInput').value;
        const pw = document.getElementById('pwInput').value;
        
        if (!content.trim()) { 
            alert("내용을 입력해주세요."); 
            return; 
        }
        
        try {
            await addDoc(postsCol, { 
                text: content, 
                password: pw || "0000", 
                createdAt: serverTimestamp() 
            });
            document.getElementById('postInput').value = "";
            document.getElementById('pwInput').value = "";
            // 작성 후 키보드 닫기 위해 포커스 해제
            document.activeElement.blur();
        } catch (e) {
            alert("저장에 실패했습니다.");
        }
    };

    onSnapshot(query(postsCol, orderBy("createdAt", "desc")), (snapshot) => {
        const list = document.getElementById('post-list');
        list.innerHTML = "";
        snapshot.forEach((p) => {
            const data = p.data();
            const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : "방금 전";
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <p class="post-content">${data.text}</p>
                <div class="post-info">
                    <span>${date}</span>
                    <button class="del-btn" onclick="deleteWithPw('${p.id}', '${data.password}')">삭제</button>
                </div>`;
            list.appendChild(card);
        });
    });

    window.deleteWithPw = async (id, correctPw) => {
        const inputPw = prompt("비밀번호를 입력하세요.");
        if (inputPw === correctPw) {
            if(confirm("정말 삭제하시겠습니까?")) await deleteDoc(doc(db, "posts", id));
        } else if (inputPw !== null) alert("비밀번호가 틀렸습니다.");
    };
</script>
</body>
</html>
