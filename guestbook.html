<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUESTBOOK</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #eef2f6; 
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
        }

        /* 🏠 좌측 상단 아이콘 바 (고정) */
        .side-nav {
            position: fixed; left: 30px; top: 30px; 
            display: flex; flex-direction: column; gap: 15px;
        }
        .nav-btn { 
            width: 45px; height: 45px; background: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            text-decoration: none;
        }

        /* 📝 [핵심] 쫌좀님이 말씀하신 한글 대제목 */
        .main-title {
            font-size: 2.5rem; font-weight: 900; color: #8ea8c9;
            letter-spacing: 5px; margin-bottom: 50px;
            /* 입체감을 살짝 준 텍스트 디자인 */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        /* 게시판 본체 (임시 박스) */
        .content-box {
            width: 600px; height: 300px; background: #eef2f6;
            border-radius: 40px;
            box-shadow: inset 10px 10px 20px #d1d9e6, inset -10px -10px 20px #ffffff;
            display: flex; align-items: center; justify-content: center;
            color: #aaa; font-weight: 700;
        }

        .back-link { position: fixed; bottom: 50px; text-decoration: none; color: #8ea8c9; font-size: 0.85rem; font-weight: 700; }
    </style>
</head>
<body>

    <div class="side-nav">
        <a href="index.html" class="nav-btn">🏠</a>
    </div>

    <h1 class="main-title">익명게시판</h1>

    <div class="content-box">
        준비 중입니다...
    </div>

    <a href="menu.html" class="back-link">← BACK TO MENU</a>

</body>
</html>
